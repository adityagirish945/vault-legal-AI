# ═══════════════════════════════════════════════════════
# Server — Concurrency & performance
# ═══════════════════════════════════════════════════════
[server]
# Max upload size in MB (for PDF/image uploads)
maxUploadSize = 25
# Enable websocket compression for lower bandwidth
enableWebsocketCompression = true

[runner]
# Allow overlapping script reruns across sessions —
# this is the key concurrency lever: user A's LLM call
# no longer blocks user B's rerun
fastReruns = true

[browser]
gatherUsageStats = false

# ═══════════════════════════════════════════════════════
# Theme — Vault brand colors
# ═══════════════════════════════════════════════════════
[theme]
base = "light"
primaryColor = "#0C0A93"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F9FAFB"
textColor = "#111827"
font = "sans serif"
